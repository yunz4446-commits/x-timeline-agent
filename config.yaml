# ============================================================
# X Timeline Agent 配置文件
# ============================================================

# LLM 配置
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: ""
  api_base: "https://api.deepseek.com"

# 聊天渠道
channels:
  feishu:
    enabled: true
    webhook_url: ""
    app_id: ""
    app_secret: ""

# 调度
schedule:
  digest_times: ["10:00", "15:00", "20:00"]
  fetch_interval_minutes: 30
  following_sync_interval_minutes: 360
  timezone: "Asia/Shanghai"

# 分类
classifier:
  min_score: 0.5
  max_items_per_digest: 20

# 告警
alerts:
  enabled: true

# 日志
logging:
  level: "INFO"
  dir: "logs"

# 存储
storage:
  db_path: "data/timeline.db"
