# ============================================================
# X Timeline Agent 配置文件
# ============================================================

# LLM 配置
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: ""
  api_base: "https://api.deepseek.com"

# 聊天渠道
channels:
  feishu:
    enabled: true
    webhook_url: ""
    app_id: ""
    app_secret: ""

# 调度
schedule:
  digest_times: ["10:00", "17:00"]
  fetch_interval_minutes: 30
  following_sync_interval_minutes: 360
  timezone: "Asia/Shanghai"

# 分类
classifier:
  min_score: 0.5
  max_items_per_digest: 20

# 存储
storage:
  db_path: "data/timeline.db"
